# Development / local-build compose file.
# For self-hosting with a pre-built image, use docker-compose.sample.yml instead:
#   cp docker-compose.sample.yml docker-compose.override.yml  # then edit as needed
#   docker compose -f docker-compose.sample.yml up -d

name: briefen

services:
  # Available models: gemma2:2b, gemma3:4b, llama3.2:3b
  # All are pulled on startup. Default model is set in backend application.yml (ollama.model).
  ollama:
    image: ollama/ollama
    container_name: briefen-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama ps > /dev/null 2>&1; do sleep 1; done
        echo "Pulling models..."
        ollama pull gemma2:2b
        ollama pull gemma3:4b
        ollama pull llama3.2:3b
        echo "All models ready."
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    profiles: ["app"]
    image: briefen
    build:
      context: .
      dockerfile: Dockerfile
    container_name: briefen-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      BRIEFEN_DB_PATH: /data/briefen.db
      OLLAMA_BASE_URL: http://briefen-ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      SERVER_PORT: 8080
    volumes:
      - briefen_data:/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  briefen_data:
