services:
  mongodb:
    image: mongo:7
    container_name: briefen-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # gemma3:4b — excellent summarization quality with 128K context window.
  # ~3.3GB download, strong markdown output, great instruction-following.
  # Change the model name below and in backend application.yml to use a different model.
  ollama:
    image: ollama/ollama
    container_name: briefen-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama ps > /dev/null 2>&1; do sleep 1; done
        echo "Ollama server is ready, pulling model..."
        ollama pull gemma3:4b
        echo "Model pulled. Warming up with a test prompt..."
        ollama run gemma3:4b "hi" --nowordwrap > /dev/null 2>&1
        echo "Model ready."
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo_data:
  ollama_data:
