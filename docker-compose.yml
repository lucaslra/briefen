services:
  mongodb:
    image: mongo:7
    container_name: briefen-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Available models: gemma2:2b, gemma3:4b, llama3.2:3b
  # All are pulled on startup. Default model is set in backend application.yml (ollama.model).
  ollama:
    image: ollama/ollama
    container_name: briefen-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama ps > /dev/null 2>&1; do sleep 1; done
        echo "Pulling models..."
        ollama pull gemma2:2b
        ollama pull gemma3:4b
        ollama pull llama3.2:3b
        echo "All models ready."
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: briefen-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      MONGODB_URI: mongodb://briefen-mongodb:27017/briefen
      OLLAMA_BASE_URL: http://briefen-ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      SERVER_PORT: 8080
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  ollama_data:
