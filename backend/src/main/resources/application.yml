spring:
  application:
    name: briefly
  data:
    mongodb:
      uri: mongodb://localhost:27017/briefly
      auto-index-creation: true

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  model: gemma3:4b
  timeout: 300s

article:
  fetch-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
