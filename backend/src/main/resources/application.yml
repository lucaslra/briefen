spring:
  application:
    name: briefen
  config:
    # Loads .env file if present (KEY=VALUE format). No-op when missing (CI/Docker use real env vars).
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:sqlite:${BRIEFEN_DB_PATH:./data/briefen.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:NONE}
  tomcat:
    connection-timeout: 310s

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3:4b}
  timeout: 300s

openai:
  base-url: https://api.openai.com
  timeout: 120s

anthropic:
  base-url: https://api.anthropic.com
  timeout: 120s

article:
  fetch-timeout: 10s

briefen:
  cors:
    allowed-origins: ${BRIEFEN_CORS_ALLOWED_ORIGINS:}
  auth:
    username: ${BRIEFEN_AUTH_USERNAME:}
    password: ${BRIEFEN_AUTH_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
