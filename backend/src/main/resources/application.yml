spring:
  application:
    name: briefen
  data:
    mongodb:
      uri: mongodb://localhost:27017/briefen
      auto-index-creation: true

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  model: gemma3:4b
  timeout: 300s

openai:
  base-url: https://api.openai.com
  timeout: 120s

article:
  fetch-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
