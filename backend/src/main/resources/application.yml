spring:
  application:
    name: briefen
  config:
    # Loads .env file if present (KEY=VALUE format). No-op when missing (CI/Docker use real env vars).
    import: optional:file:.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/briefen}
      auto-index-creation: true

server:
  port: ${SERVER_PORT:8080}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3:4b}
  timeout: 300s

openai:
  base-url: https://api.openai.com
  timeout: 120s

article:
  fetch-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
