spring:
  application:
    name: briefen
  config:
    # Loads .env file if present (KEY=VALUE format). No-op when missing (CI/Docker use real env vars).
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:sqlite:${BRIEFEN_DB_PATH:./data/briefen.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3:4b}
  timeout: 300s

openai:
  base-url: https://api.openai.com
  timeout: 120s

anthropic:
  base-url: https://api.anthropic.com
  timeout: 120s

article:
  fetch-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
