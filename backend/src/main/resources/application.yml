spring:
  application:
    name: briefen
  profiles:
    # BRIEFEN_LOG_FORMAT=json activates the "json" Spring profile,
    # which switches logback-spring.xml from human-readable to structured JSON output.
    include: ${BRIEFEN_LOG_FORMAT:}
  config:
    # Loads .env file if present (KEY=VALUE format). No-op when missing (CI/Docker use real env vars).
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_BIND_ADDRESS:0.0.0.0}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:NONE}
  tomcat:
    connection-timeout: 310s

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3:4b}
  timeout: 300s
  num-predict-shorter: ${OLLAMA_NUM_PREDICT_SHORTER:384}
  num-predict-default: ${OLLAMA_NUM_PREDICT_DEFAULT:1024}
  num-predict-longer: ${OLLAMA_NUM_PREDICT_LONGER:2048}

openai:
  base-url: https://api.openai.com
  timeout: 120s

anthropic:
  base-url: https://api.anthropic.com
  timeout: 120s

article:
  fetch-timeout: 10s

briefen:
  cors:
    allowed-origins: ${BRIEFEN_CORS_ALLOWED_ORIGINS:}
  webhook:
    url: ${BRIEFEN_WEBHOOK_URL:}
  openai:
    api-key: ${BRIEFEN_OPENAI_API_KEY:}
  anthropic:
    api-key: ${BRIEFEN_ANTHROPIC_API_KEY:}
  default-prompt: ${BRIEFEN_DEFAULT_PROMPT:}

logging:
  level:
    com.briefen: ${BRIEFEN_LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
