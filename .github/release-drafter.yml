# Release Drafter — configuration for auto-generated release notes
# Used by the release-drafter workflow (.github/workflows/release-drafter.yml)
# Docs: https://github.com/release-drafter/release-drafter

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

no-changes-template: |
  No changes recorded yet. Merge a pull request into `main` to populate this draft.

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"

categories:
  - title: "🚀 New Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "⚙️ Backend"
    labels:
      - "backend"
  - title: "🎨 Frontend"
    labels:
      - "frontend"
  - title: "🏗️ Infrastructure"
    labels:
      - "infra"
      - "github-actions"
      - "docker"
  - title: "📦 Dependencies"
    labels:
      - "dependencies"
  - title: "📖 Documentation"
    labels:
      - "docs"
  - title: "🔄 Other Changes"
    labels:
      - "other"

# Catch-all: PRs that don't match any category above appear here.
# This ensures no merged PR is silently dropped from the draft.
exclude-labels:
  - "skip-changelog"

# Auto-label PRs by branch name prefix OR conventional-commit PR title.
# Both are checked — whichever matches first wins.
autolabeler:
  - label: "feature"
    branch: ["/^feat(ure)?[/-]/"]
    title: ["/^feat(ure)?[:(\\s]/i"]
  - label: "bug"
    branch: ["/^(bug)?fix[/-]/"]
    title: ["/^fix[:(\\s]/i"]
  - label: "docs"
    branch: ["/^docs?[/-]/"]
    title: ["/^docs?[:(\\s]/i"]
  - label: "infra"
    branch: ["/^(infra|ci|chore)[/-]/"]
    title: ["/^(chore|ci|infra|build|test)[:(\\s]/i"]
  - label: "dependencies"
    title: ["/^(deps?|bump|upgrade|update)[:(\\s]/i"]

# Bump version based on labels
version-resolver:
  major:
    labels: ["major"]
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["bug", "fix", "dependencies", "backend", "frontend", "infra"]
  default: patch
