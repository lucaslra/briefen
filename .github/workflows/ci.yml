# =============================================================================
# Briefen CI — Build & Test
# =============================================================================
#
# What it does:
#   A changes-detection job identifies which parts of the codebase were
#   modified. Backend, frontend, and mobile jobs only run when their own
#   source tree changed. The dependency-audit job only runs when lock files
#   change. A final `ci-passed` gate treats skipped jobs as passing so branch
#   protection always has a result to check.
#
# How to extend:
#   - Change the Java version: update `java-version` in the backend job and
#     `<java.version>` in backend/pom.xml.
#   - Add a new test suite: add a step in the appropriate job.
#   - Add a new source tree: add an entry in the `changes` job filters, add a
#     corresponding job with `if: needs.changes.outputs.<name> == 'true'`, and
#     add it to the `ci-passed` needs list.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/labeler.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/labeler.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Changes detection — determines which jobs need to run
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile:   ${{ steps.filter.outputs.mobile }}
      deps:     ${{ steps.filter.outputs.deps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Filter changed paths
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
              - 'e2e/**'
            mobile:
              - 'mobile/**'
            deps:
              - 'backend/pom.xml'
              - 'frontend/pnpm-lock.yaml'

  # ---------------------------------------------------------------------------
  # Secret scanning — Gitleaks across full history
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Backend — Java 25 / Spring Boot / Maven
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Java 25, Maven)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      OLLAMA_BASE_URL: http://localhost:11434

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Java 25 (Temurin) with Maven cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml

      - name: Build and verify
        run: ./mvnw --batch-mode verify

      - name: Upload Surefire test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload Failsafe test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: backend-failsafe-reports
          path: backend/target/failsafe-reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Frontend — React / Vite / pnpm
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node LTS, pnpm)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288  # v5
        with:
          version: 9

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Run tests
        id: run-tests
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts?.test ? 0 : 1)"; then
            pnpm run test:coverage 2>/dev/null || pnpm test
          else
            echo "No test script configured — skipping"
          fi

      - name: Upload coverage report
        if: ${{ steps.run-tests.outcome == 'success' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Mobile — Flutter analyze + unit tests
  # ---------------------------------------------------------------------------
  mobile:
    name: Mobile (Flutter, stable)
    needs: [changes]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Flutter (stable channel)
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ---------------------------------------------------------------------------
  # Dependency audit — OWASP + pnpm audit (only when lock files change)
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    needs: [changes]
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      # ---- Backend: OWASP Dependency-Check ----
      - name: Set up Java 25 (Temurin) with Maven cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml

      - name: OWASP Dependency-Check (backend)
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          NVD_ARGS=""
          if [ -n "$NVD_API_KEY" ]; then
            NVD_ARGS="-DnvdApiKey=$NVD_API_KEY"
          else
            echo "::warning::No NVD_API_KEY secret configured — NVD update will be slow. Get a free key at https://nvd.nist.gov/developers/request-an-api-key"
            NVD_ARGS="-DnvdApiDelay=6000"
          fi
          ./mvnw --batch-mode org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=owasp-suppressions.xml \
            -Dformats=HTML,JSON \
            $NVD_ARGS
        continue-on-error: true

      - name: Upload OWASP report
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: owasp-dependency-check-report
          path: backend/target/dependency-check-report.*
          if-no-files-found: ignore

      # ---- Frontend: pnpm audit ----
      - name: Set up pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288  # v5
        with:
          version: 9

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 'lts/*'

      - name: pnpm audit (frontend)
        working-directory: frontend
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Gate — single required status check for branch protection
  # ---------------------------------------------------------------------------
  ci-passed:
    name: CI Passed
    if: ${{ always() }}
    needs: [secrets, backend, frontend, mobile]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          # A job result of "skipped" means its paths didn't match — that's fine.
          # Only "failure" or "cancelled" should block the merge.
          for result in \
            "${{ needs.secrets.result }}" \
            "${{ needs.backend.result }}" \
            "${{ needs.frontend.result }}" \
            "${{ needs.mobile.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Blocking result: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were not applicable."
