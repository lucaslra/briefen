# Release — auto-publish a GitHub Release when a version tag is pushed.
# Uses GitHub's auto-generated release notes (based on commits since the previous tag).
# The Docker workflow (docker.yml) also triggers on the same tags to build/push images.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
