name: briefen
description: "Briefen — article summarizer mobile client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  flutter_markdown: ^0.7.7
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  flutter_foreground_task: ^8.17.0
  local_auth: ^2.3.0
  flutter_svg: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
