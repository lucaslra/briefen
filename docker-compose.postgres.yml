# PostgreSQL override for docker-compose.yml (development).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# This file adds a PostgreSQL service and reconfigures the app to use it
# instead of SQLite. Ollama and all other settings from docker-compose.yml
# remain unchanged.

services:
  postgres:
    image: postgres:17-alpine
    container_name: briefen-postgres
    environment:
      POSTGRES_DB: briefen
      POSTGRES_USER: briefen
      POSTGRES_PASSWORD: briefen
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briefen"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    environment:
      BRIEFEN_DB_TYPE: postgres
      BRIEFEN_DATASOURCE_URL: jdbc:postgresql://briefen-postgres:5432/briefen
      BRIEFEN_DATASOURCE_USERNAME: briefen
      BRIEFEN_DATASOURCE_PASSWORD: briefen
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
