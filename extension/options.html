<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Briefen – Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="icons/icon-48.svg" alt="" class="logo" width="24" height="24">
      <h1 class="title">Briefen Settings</h1>
    </header>

    <main class="main">
      <div class="field">
        <label for="briefen-url" class="label">Briefen instance URL</label>
        <p class="hint">The address where your Briefen backend is running.</p>
        <input
          id="briefen-url"
          type="url"
          class="input"
          placeholder="http://localhost:8080"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary">Save</button>
        <button id="test-btn" class="btn btn-ghost">Test connection</button>
      </div>

      <div id="feedback" class="feedback hidden" role="status" aria-live="polite"></div>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
